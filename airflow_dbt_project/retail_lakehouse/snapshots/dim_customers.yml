snapshots:
  - name: dim_customers
    relation: ref('eph_customers')
    config:
      schema: gold
      database: "{{ env_var('DATABRICKS_CATALOG', 'retail_analytics') }}"
      unique_key: customer_id
      strategy: timestamp
      updated_at: customer_updated_timestamp
      dbt_valid_to_current: "to_date('9999-12-31')"