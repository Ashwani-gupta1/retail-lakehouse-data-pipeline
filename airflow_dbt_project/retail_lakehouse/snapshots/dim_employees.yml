snapshots:
  - name: dim_employees
    relation: ref('eph_employees')
    config:
      schema: gold
      database: "{{ env_var('DATABRICKS_CATALOG', 'retail_analytics') }}"
      unique_key: employee_id
      strategy: timestamp
      updated_at: employee_updated_timestamp
      dbt_valid_to_current: "to_date('9999-12-31')"