# Name your project! Project names should contain only lowercase characters
# and underscores.

name: 'retail_lakehouse'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'retail_lakehouse'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  retail_lakehouse:
    silver_t:
      +materialized: table
      +schema: silver_t

    silver_b:
      +materialized: table
      +schema: silver_b

    gold:
      +materialized: table
      +schema: gold

      ephemeral:
        +materialized: ephemeral